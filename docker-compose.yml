services:
  # 1. PostgreSQL (메인 데이터베이스)
  db:
    image: postgres:15
    container_name: aiops_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432" # PostgreSQL 기본포트, 내 컴퓨터의 5432 포트와 컨테이너의 5432 포트를 연결
    volumes:
      - pgdata:/var/lib/postgresql/data # DB가 꺼져도 데이터가 날아가지 않게 저장

  # 2. Target Server (장애 발생 및 복구 실험용 Nginx)
  nginx_target:
    image: nginx:latest
    container_name: target_nginx
    ports:
      - "8080:80" # localhost:8080으로 접속하면 Nginx 화면이 나옴
    # 나중에 FastAPI의 Docker SDK로 이 컨테이너를 죽이고 살릴 예정

  # 3. 메트릭 에이전트 (Prometheus가 scrape할 프로미터 메트릭 노출)
  agent:
    build:
      context: ./agent
    container_name: aiops_agent
    environment:
      FORCE_CPU_USAGE: ${FORCE_CPU_USAGE:-}
      FORCE_MEMORY_USAGE: ${FORCE_MEMORY_USAGE:-}
      LOAD_TEST_STATUS_FILE: /tmp/auto-healing-load-test/status.json
    volumes:
      - ./agent:/app
      - ./infra:/infra
    working_dir: /app
    command: python agent.py
    ports:
      - "9100:9100"

  # 4. Prometheus (모니터링)
  prometheus:
    image: prom/prometheus:latest
    container_name: aiops_prometheus
    ports:
      - "9090:9090" # Prometheus 기본 포트, localhost:9090으로 접속하면 프로메테우스 화면이 나옴
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/rules.yml:/etc/prometheus/rules.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - agent
      - alertmanager

  # 5. Alertmanager (Alert routing 및 webhook 전달)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: aiops_alertmanager
    ports:
      - "9093:9093" # Alertmanager UI 접속
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    depends_on:
      - backend

  # 6. backend (FastAPI 애플리케이션)
  backend:
    build:
      context: ./backend
    container_name: aiops_backend
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata: # PostgreSQL 데이터를 저장할 가상 공간
