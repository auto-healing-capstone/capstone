upstream backend {
    server upstream_app:80;
}

server {
    listen 80;
    server_name _;

    # nginx 상태 페이지 (Prometheus scrape용)
    location /stub_status {
        stub_status on;
        access_log off;
        allow 172.16.0.0/12;
        deny all;
    }

    # 헬스체크 (Prometheus rule-based 탐지 대상)
    location /health {
        access_log off;
        return 200 'OK\n';
        add_header Content-Type text/plain;
    }

    # 기본 요청 → upstream 프록시 (upstream 다운 시 502 반환)
    location / {
        proxy_pass http://backend;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }
}
