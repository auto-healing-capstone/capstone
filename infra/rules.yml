groups:
  - name: baseline-dummy-alerts
    rules:
    - alert: HighCPUUsage
      expr: dummy_cpu_usage > 85
      for: 2m
      labels:
        severity: info
        source: dummy-agent
      annotations:
        summary: "Dummy CPU usage detected"
        description: "Dummy CPU usage is {{ $value }}%"

    - alert: HighMemoryUsage
      expr: dummy_memory_usage > 85
      for: 2m
      labels:
        severity: info
        source: dummy-agent
      annotations:
        summary: "Dummy memory usage detected"
        description: "Dummy memory usage is {{ $value }}%"

  - name: infra-load-test-alerts
    rules:
    - alert: LoadTestHighMemoryUsage
      expr: infra_load_test_memory_mb > 240
      for: 15s
      labels:
        severity: warning
        source: infra-load-test
        action: update_resources
      annotations:
        summary: "Load test memory usage detected"
        description: "Infra load test memory usage is {{ $value }} MB"

    - alert: LoadTestHighDiskUsage
      expr: infra_load_test_disk_mb > 240
      for: 15s
      labels:
        severity: warning
        source: infra-load-test
        action: cleanup_disk
      annotations:
        summary: "Load test disk usage detected"
        description: "Infra load test disk usage is {{ $value }} MB"

  # ── 장애 시나리오 알림 규칙 ───────────────────────────────────────────────

  - name: nginx-scenario-alerts
    rules:
    - alert: NginxHighErrorRate
      expr: infra_nginx_5xx_total > 0
      for: 15s
      labels:
        severity: critical
        source: nginx
        action: reload_nginx
      annotations:
        summary: "Nginx 5xx 에러 감지"
        description: "Nginx 5xx 에러 누적: {{ $value }}건 (upstream 장애 가능성)"

  - name: db-scenario-alerts
    rules:
    - alert: DBConnectionPoolExhausted
      expr: infra_db_active_connections > 0 and infra_db_max_connections > 0 and (infra_db_active_connections / infra_db_max_connections) >= 0.9
      for: 15s
      labels:
        severity: critical
        source: postgres
        action: update_db_config
      annotations:
        summary: "DB 커넥션 풀 고갈 임박"
        description: "활성 연결 {{ $value }}개 — max_connections 90% 초과"

  - name: oom-scenario-alerts
    rules:
    - alert: ContainerOOMKilled
      expr: infra_container_oom_killed > 0
      for: 5s
      labels:
        severity: critical
        source: docker
        action: update_resources
      annotations:
        summary: "컨테이너 OOM Kill 감지"
        description: "OOM Kill 발생 컨테이너 수: {{ $value }}"
