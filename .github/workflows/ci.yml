name: Backend CI (Lint & Test)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend  # backend 폴더 지정

    steps:
      - name: 📥 코드 가져오기 (Checkout)
        uses: actions/checkout@v3

      - name: 🐍 파이썬 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: "3.10" 

      - name: 📦 의존성 패키지 및 검사 도구 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pytest  # 검사용 도구들 임시 설치

      - name: ✨ 코드 스타일 검사 (Black & Flake8)
        run: |
          # Black: 띄어쓰기, 줄바꿈 등 포맷팅이 잘 맞는지 검사
          black --check .
          # Flake8: 문법 에러나 사용하지 않는 변수 등을 검사
          flake8 . --max-line-length=88 --extend-ignore=E203

    # - name: 🛠️ 빌드 및 테스트 (Pytest)
    #   run: |
    #     # 작성된 테스트 코드가 있다면 실행해서 통과하는지 확인
    #     pytest